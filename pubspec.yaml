name: firewatch
description: >
  Lightweight Firestore repositories for Flutter: single-doc, collection,
  and collection-group repos that react to auth, stream updates, and support
  live-window pagination.
version: 1.4.0
homepage: https://github.com/Ratio-et-Ars/firewatch
repository: https://github.com/Ratio-et-Ars/firewatch
issue_tracker: https://github.com/Ratio-et-Ars/firewatch/issues
documentation: https://ratio-et-ars.github.io/firewatch/
topics:
  - firestore
  - repository
  - state-management
  - pagination
  - flutter

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: ^6.0.0
  command_it: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  fake_cloud_firestore: ^4.0.0
  flutter_lints: ^6.0.0
  test: ^1.25.0

flutter:
  uses-material-design: false
